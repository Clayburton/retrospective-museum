<!-- ============================================================
     the [retrospective] museum — entrance banner
     Paste this WHOLE block into a WordPress "Custom HTML" block,
     anywhere you want the door to appear (music page, home page).

     • Full-bleed width, and taller than the "experience i am" strip.
     • Clicking anywhere in it walks the visitor into the museum —
       it navigates THIS page, so set MUSEUM_URL in app.js to the
       WordPress page where the museum itself is embedded.
     • Two things reward a poke instead of entering: knock on the
       building's sign, and startle whatever lives in the grass.
     ============================================================ -->
<div id="retro-enter"
     style="position:relative;width:100vw;left:50%;right:50%;margin-left:-50vw;margin-right:-50vw;
            height:clamp(560px,82vh,860px);background:#101010;overflow:hidden;">
  <iframe
    src="https://clayburton.github.io/retrospective-museum/enter/"
    title="the [retrospective] museum — clay and kelsy"
    loading="lazy"
    allow="autoplay"
    style="position:absolute;inset:0;width:100%;height:100%;border:0;display:block;">
  </iframe>
</div>
